source=$HOME/.config/hypr/latte.conf

$active = $mauve
$group = $peach
$inactive = $surface1

exec-once = uwsm app -s s -- swayosd-server

# https://wiki.hypr.land/Configuring/Monitors/#monitor-v2
monitorv2 {
  output = desc:Samsung Electric Company LS32A70 HK7W200056
  mode = preferred
  scale = 1.5
  bitdepth = 10
  cm = wide
}

monitorv2 {
  output = desc:Samsung Display Corp. ATNA40HQ05-0
  mode = preferred
  scale = 1.5
  bitdepth = 10
  cm = dcip3
}

# https://wiki.hypr.land/Configuring/Variables/#general
general {
  border_size = 4
  gaps_in = 4
  gaps_out = 8
  col.active_border = $active
  col.inactive_border = $inactive
  layout = scrolling
  no_focus_fallback = true
  allow_tearing = true

  # https://wiki.hypr.land/Configuring/Variables/#snap
  snap {
    enabled = true
    respect_gaps = true
  }
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
  rounding = 4

  blur {
    enabled = false
  }

  shadow {
    enabled = false
  }
}

# https://wiki.hypr.land/Configuring/Animations/
animations {
  bezier = easeOutExpo, 0.16, 1, 0.3, 1

  animation = global, 1, 3, easeOutExpo
  animation = windows, 1, 3, easeOutExpo, slidefadevert
  animation = workspaces, 1, 3, easeOutExpo, slidefadevert
  animation = specialWorkspace, 1, 3, easeOutExpo, slidefadevert 10%
}

# https://wiki.hypr.land/Configuring/Variables/#input
input {
  kb_layout = us,ru
  kb_options = grp:alt_space_toggle

  float_switch_override_focus = 0
  accel_profile = flat

  # https://wiki.hypr.land/Configuring/Variables/#touchpad
  touchpad {
    natural_scroll = yes
    scroll_factor = 0.4
    drag_lock = yes
  }
}

# https://wiki.hypr.land/Configuring/Variables/#gestures
gestures {
  workspace_swipe_cancel_ratio = 0.1
  workspace_swipe_touch = true
}

# https://wiki.hypr.land/Configuring/Variables/#group
group {
  col.border_active = $group
  col.border_inactive = $inactive
  col.border_locked_active = $active
  col.border_locked_inactive = $inactive

  # https://wiki.hypr.land/Configuring/Variables/#groupbar
  groupbar {
    gradients = true
    font_size = 24
    height = 24
    indicator_height = 0
    text_color = $base
    gradient_rounding = 8

    col.active = $group
    col.inactive = $inactive
    col.locked_active = $active
    col.locked_inactive = $inactive
  }
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
  font_family = FantasqueSansM Nerd Font
  mouse_move_enables_dpms = true
  key_press_enables_dpms = true
  focus_on_activate = true
  on_focus_under_fullscreen = 0
  middle_click_paste = false
}

# https://wiki.hypr.land/Configuring/Variables/#binds
binds {
  workspace_back_and_forth = yes
}

# https://wiki.hypr.land/Configuring/Variables/#xwayland
xwayland {
  use_nearest_neighbor = false
}

# https://wiki.hypr.land/Configuring/Variables/#ecosystem
ecosystem {
  enforce_permissions = true
}

# https://wiki.hypr.land/Configuring/Dwindle-Layout/
dwindle {
  force_split = 2
  preserve_split = yes
  special_scale_factor = 0.9
}

# https://wiki.hypr.land/Configuring/Gestures/
gesture = 4, vertical, workspace
gesture = 4, horizontal, scrollMove

permission = /usr/bin/grim, screencopy, allow
permission = /usr/bin/hyprlock, screencopy, allow
permission = /usr/bin/still, screencopy, allow
permission = /usr/lib/xdg-desktop-portal-hyprland, screencopy, allow

bindle = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower
bindle = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise

bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next

bindl = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle && canberra-gtk-play --id audio-volume-change
bindle = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower && canberra-gtk-play --id audio-volume-change
bindle = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise && canberra-gtk-play --id audio-volume-change

bind = SUPER, RETURN, exec, uwsm app -- kitty --single-instance
bind = SUPER, R, exec, fuzzel --output=$(hyprctl monitors -j | jq --raw-output 'map(select(.focused == true))[0].name')
bind = SUPER, C, killactive,
$takeScreenshot = exec, still -p -c 'slurp -d | grim -g- -l0 -' | swappy -f -
bind = SUPER, S, $takeScreenshot
bind = , Print, $takeScreenshot
bind = SUPER, N, exec, swaync-client -t
bind = CTRL ALT SHIFT, BACKSPACE, exec, uwsm stop
bind = SUPER CTRL, Q, exec, loginctl lock-session

bind = SUPER, H, movefocus, l
bind = SUPER, J, movefocus, d
bind = SUPER, K, movefocus, u
bind = SUPER, L, movefocus, r

bind = SUPER SHIFT, H, movewindow, l
bind = SUPER SHIFT, J, movewindow, d
bind = SUPER SHIFT, K, movewindow, u
bind = SUPER SHIFT, L, movewindow, r

bind = SUPER, O, focusmonitor, +1
bind = SUPER SHIFT, O, movewindow, mon:+1

bind = SUPER, GRAVE, togglefloating,
bind = SUPER SHIFT, GRAVE, pin,
bind = SUPER, F, fullscreen, 0
bind = SUPER SHIFT, F, fullscreenstate, -1 2
bind = SUPER, M, fullscreen, 1

bindm = SUPER, mouse:272, resizewindow
bindm = SUPER SHIFT, mouse:272, movewindow

bind = SUPER, COMMA, layoutmsg, colresize -conf
bind = SUPER, PERIOD, layoutmsg, colresize +conf
bind = SUPER, SLASH, layoutmsg, promote

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, togglespecialworkspace, 0

bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, special:0

bind = SUPER CTRL, T, togglegroup
bind = SUPER, T, lockactivegroup, toggle
bind = SUPER, BRACKETRIGHT, changegroupactive, f
bind = SUPER, BRACKETLEFT, changegroupactive, b

bind = SUPER CTRL, J, moveintogroup, d
bind = SUPER CTRL, K, moveintogroup, u
bind = SUPER CTRL, L, moveintogroup, r
bind = SUPER CTRL, H, moveintogroup, l
bind = SUPER, BACKSPACE, moveoutofgroup

bind = SUPER, P, pseudo,
bind = SUPER, D, layoutmsg, togglesplit

windowrule = match:class ^(hyprland-share-picker)$, float true
windowrule = match:class ^(mpv)$, float true
windowrule = match:class ^(org.gnome.Loupe)$, float true
windowrule = match:class ^(org.gnome.Showtime)$, float true
windowrule = match:class ^(org.keepassxc.KeePassXC)$, no_screen_share true
windowrule = match:class ^(org.telegram.desktop)$, match:title ^(Просмотр медиа)$, float true, fullscreen true
windowrule = match:class ^(zen)$, match:title ^(Картинка в картинке)$, suppress_event activatefocus maximize

layerrule = match:namespace launcher, dim_around true, animation popin 80%
layerrule = match:namespace still, no_anim true
layerrule = match:namespace swaync-control-center, dim_around true, animation slide right
layerrule = match:namespace swaync-notification-window, no_anim true
layerrule = match:namespace waybar, animation slide top
